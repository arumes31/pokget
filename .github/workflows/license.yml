name: License Check
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Check dependencies licenses
        uses: wntrblm/nox@2024.03.02
        with:
          python-versions: "3.12"
      - name: Run reuse lint
        run: |
          pip install reuse
          reuse lint
