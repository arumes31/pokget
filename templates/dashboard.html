<!-- Hero Section: Total Portfolio Value -->
<section class="relative animate-in">
    <div class="absolute -top-10 -left-10 w-64 h-64 bg-primary/10 blur-[100px] rounded-full"></div>
    <div class="glass-card rounded-xl p-lg relative overflow-hidden border border-white/5">
        <div class="flex flex-col gap-xs">
            <span class="font-label-sm text-xs uppercase text-on-surface-variant tracking-widest opacity-60">Total Portfolio Value</span>
            <div class="flex items-baseline gap-md">
                <span class="font-h1 text-4xl md:text-5xl font-bold text-on-surface tracking-tight">$12,450.80</span>
                <div class="flex items-center text-tertiary gap-xs px-2 py-1 bg-tertiary/10 rounded-full border border-tertiary/20">
                    <span class="material-symbols-outlined text-[16px]">trending_up</span>
                    <span class="font-label-sm text-[10px] font-bold">+4.2%</span>
                </div>
            </div>
        </div>
        <!-- Mini Sparkline visualization -->
        <div class="mt-lg h-24 w-full relative">
            <svg class="w-full h-full" preserveAspectRatio="none" viewBox="0 0 400 100">
                <defs>
                    <linearGradient id="gradient-hero" x1="0%" x2="0%" y1="0%" y2="100%">
                        <stop offset="0%" stop-color="#ddb7ff" stop-opacity="0.3"></stop>
                        <stop offset="100%" stop-color="#ddb7ff" stop-opacity="0"></stop>
                    </linearGradient>
                </defs>
                <path class="drop-shadow-[0_0_8px_rgba(221,183,255,0.8)]" d="M0,80 Q50,70 100,85 T200,40 T300,60 T400,20" fill="transparent" stroke="#ddb7ff" stroke-width="3"></path>
                <path d="M0,80 Q50,70 100,85 T200,40 T300,60 T400,20 L400,100 L0,100 Z" fill="url(#gradient-hero)"></path>
            </svg>
        </div>
    </div>
</section>

<!-- Portfolio Stats: Horizontal Scrolling -->
<section class="flex overflow-x-auto gap-md no-scrollbar pb-md -mx-md px-md scroll-smooth">
    <!-- Stat 1 -->
    <div class="glass-card min-w-[160px] flex-shrink-0 p-md rounded-xl flex flex-col gap-xs border-l-4 border-l-primary/40">
        <span class="font-label-sm text-[10px] uppercase tracking-widest text-on-surface-variant opacity-60">Total Cards</span>
        <span class="font-bold text-2xl text-on-surface">342</span>
    </div>
    <!-- Stat 2 -->
    <div class="glass-card min-w-[200px] flex-shrink-0 p-md rounded-xl flex flex-col gap-xs border-l-4 border-l-secondary/40">
        <span class="font-label-sm text-[10px] uppercase tracking-widest text-on-surface-variant opacity-60">Top Performer</span>
        <div class="flex items-center gap-xs">
            <span class="font-bold text-lg text-secondary truncate">Charizard VMAX</span>
        </div>
    </div>
    <!-- Stat 3 -->
    <div class="glass-card min-w-[160px] flex-shrink-0 p-md rounded-xl flex flex-col gap-xs border-l-4 border-l-tertiary/40">
        <span class="font-label-sm text-[10px] uppercase tracking-widest text-on-surface-variant opacity-60">Binders</span>
        <span class="font-bold text-2xl text-on-surface">12</span>
    </div>
</section>

<!-- Card Collection Grid -->
<section class="space-y-lg">
    <div class="flex justify-between items-end">
        <h2 class="font-h2 text-2xl font-bold text-on-surface">Your Collection</h2>
        <button class="font-label-sm text-[10px] text-primary uppercase tracking-widest hover:opacity-80 transition-opacity" hx-get="/binders" hx-target="#main-content">See All</button>
    </div>
    <div class="grid grid-cols-2 gap-md md:grid-cols-4 lg:grid-cols-6 pb-8">
        <!-- Mock Card Items for now, will be dynamic soon -->
        <template x-for="i in 6" :key="i">
            <div class="glass-card rounded-xl p-sm flex flex-col gap-sm group hover:border-primary/40 transition-all duration-300 cursor-pointer active:scale-95">
                <div class="aspect-[3/4] rounded-lg overflow-hidden relative shadow-lg">
                    <img :src="'https://images.pokemontcg.io/swsh4/174_hires.png'" alt="Card" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                </div>
                <div class="px-xs pb-xs">
                    <p class="font-label-sm text-xs text-on-surface-variant truncate">Mewtwo GX</p>
                    <div class="flex justify-between items-center mt-1">
                        <span class="font-bold text-lg text-on-surface">$245.00</span>
                        <svg class="w-12 h-6" viewBox="0 0 100 40">
                            <path d="M0,30 Q25,25 50,15 T100,5" fill="none" stroke="#4cd7f6" stroke-width="2"></path>
                        </svg>
                    </div>
                </div>
            </div>
        </template>
    </div>
</section>
