<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokget | Auth</title>
    <script src="/static/js/alpine.min.js?v=2" defer></script>
    <link rel="icon" type="image/png" href="/static/img/logo.png?v=2">
    <link rel="stylesheet" href="/static/css/styles.css?v=2">
</head>
<body class="bg-[#050505]">
    <div class="app-container">
        <!-- Ambient Background Glow -->
        <div class="glow-blob glow-purple"></div>
        <div class="glow-blob glow-pink"></div>

        <header class="flex items-center justify-center py-8">
            <img src="/static/img/logo.png" alt="Pokget Logo" class="w-32 h-auto">
        </header>

        <main class="flex-1">
            {{template "auth_fragment.html" .}}
        </main>
    </div>

    <!-- Notification Toast -->
    <div x-data="{ show: false, msg: '', type: 'info' }"
         @notify.window="show = true; msg = $event.detail.msg; type = $event.detail.type; setTimeout(() => show = false, 3000)"
         x-show="show"
         x-transition
         class="fixed bottom-24 left-half translate-x-half z-50">
        <div class="glass-card py-3 px-6 shadow-2xl border-white/10"
             :class="type === 'error' ? 'border-red-500/50' : 'border-purple-500/50'">
            <p class="text-sm font-bold" x-text="msg"></p>
        </div>
    </div>
</body>
</html>
