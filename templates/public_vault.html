<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokget Vault | Public Collection</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen p-md md:p-xl">
    <div class="max-w-7xl mx-auto space-y-xl">
        <!-- Profile Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-md border-b border-white/5 pb-xl">
            <div class="flex items-center gap-md">
                <div class="w-20 h-20 rounded-full bg-gradient-to-br from-primary to-secondary p-1">
                    <div class="w-full h-full rounded-full bg-surface flex items-center justify-center overflow-hidden">
                        <img src="/static/img/ranks/novice.png" alt="Avatar" class="w-12 h-12">
                    </div>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">The Collector's Vault</h1>
                    <div class="flex items-center gap-sm mt-1">
                        <span class="text-primary font-bold uppercase text-xs tracking-widest">{{ .Rank }}</span>
                        <span class="text-on-surface-variant opacity-40 text-xs">•</span>
                        <span class="text-on-surface-variant text-xs">{{ .XP }} Total XP</span>
                    </div>
                </div>
            </div>
            <div class="flex gap-sm">
                <div class="glass-card px-md py-sm rounded-lg flex flex-col items-center">
                    <span class="text-[10px] uppercase opacity-40 font-bold">Total Value</span>
                    <span class="text-xl font-bold text-primary">$12,450</span>
                </div>
                <div class="glass-card px-md py-sm rounded-lg flex flex-col items-center">
                    <span class="text-[10px] uppercase opacity-40 font-bold">Total Cards</span>
                    <span class="text-xl font-bold text-on-surface">{{ len .Portfolio }}</span>
                </div>
            </div>
        </header>

        <!-- Collection Grid -->
        <section class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-md">
            {{ range .Portfolio }}
            <div class="glass-card rounded-xl p-sm flex flex-col gap-sm group transition-all duration-300">
                <div class="aspect-[3/4] rounded-lg overflow-hidden relative shadow-lg">
                    <img src="{{ .Card.ImageURL }}" alt="{{ .Card.Card.Name }}" class="w-full h-full object-cover">
                    {{ if .Grade }}
                    <div class="absolute top-2 right-2 bg-black/80 backdrop-blur-md px-2 py-0.5 rounded border border-white/20 text-[10px] font-bold text-primary">
                        {{ .GradingCompany }} {{ .Grade }}
                    </div>
                    {{ end }}
                </div>
                <div class="px-xs pb-xs">
                    <p class="font-label-sm text-[8px] text-primary-fixed-dim uppercase tracking-widest">{{ .Card.Game }}</p>
                    <p class="font-label-sm text-xs text-on-surface-variant truncate">{{ .Card.Name }}</p>
                    <div class="flex justify-between items-center mt-1">
                        <span class="font-bold text-lg text-on-surface">${{ .Card.PriceUSD }}</span>
                    </div>
                </div>
            </div>
            {{ end }}
        </section>

        <footer class="text-center pt-xl opacity-20 hover:opacity-100 transition-opacity">
            <p class="text-xs uppercase tracking-[0.3em]">Built with Pokget TCG Portfolio</p>
        </footer>
    </div>
</body>
</html>
