<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Pokget Vault - Premium TCG Portfolio</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="/static/js/alpine.min.js?v=3" defer></script>
    <script src="/static/js/htmx.min.js?v=3"></script>
    <script src="/static/js/vault.js?v=3" defer></script>
    <link rel="icon" type="image/png" href="/static/img/logo.png?v=3">
    <link rel="stylesheet" href="/static/css/styles.css?v=3">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ddb7ff">
    <meta name="csrf-token" content="{{ .CSRFToken }}">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/js/sw.js');
            });
        }
    </script>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                "colors": {
                        "tertiary-fixed-dim": "#4cd7f6",
                        "background": "#131314",
                        "primary": "#ddb7ff",
                        "surface-container-low": "#1c1b1c",
                        "primary-fixed-dim": "#ddb7ff",
                        "on-surface-variant": "#cfc2d6",
                        "on-primary-container": "#400071",
                        "outline-variant": "#4d4354",
                        "inverse-primary": "#842bd2",
                        "tertiary-container": "#009eb9",
                        "on-error": "#690005",
                        "inverse-surface": "#e5e2e3",
                        "primary-container": "#b76dff",
                        "on-primary-fixed": "#2c0051",
                        "surface-container-lowest": "#0e0e0f",
                        "error": "#ffb4ab",
                        "secondary-container": "#aa0266",
                        "on-primary": "#490080",
                        "error-container": "#93000a",
                        "on-tertiary-fixed": "#001f26",
                        "surface-dim": "#131314",
                        "outline": "#988d9f",
                        "secondary-fixed": "#ffd9e4",
                        "on-tertiary": "#003640",
                        "on-background": "#e5e2e3",
                        "surface-variant": "#353436",
                        "on-secondary-fixed-variant": "#8c0053",
                        "tertiary-fixed": "#acedff",
                        "surface-container-highest": "#353436",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed": "#3e0022",
                        "inverse-on-surface": "#313031",
                        "surface-tint": "#ddb7ff",
                        "secondary-fixed-dim": "#ffb0cd",
                        "surface-bright": "#3a393a",
                        "on-secondary-container": "#ffbad3",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "on-primary-fixed-variant": "#6900b3",
                        "tertiary": "#4cd7f6",
                        "secondary": "#ffb0cd",
                        "primary-fixed": "#f0dbff",
                        "on-secondary": "#640039",
                        "surface-container-high": "#2a2a2b",
                        "on-tertiary-container": "#002f38",
                        "surface-container": "#201f20",
                        "on-surface": "#e5e2e3",
                        "surface": "#131314"
                },
                "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                },
                "spacing": {
                        "unit": "4px",
                        "md": "16px",
                        "lg": "24px",
                        "gutter": "24px",
                        "sm": "8px",
                        "xxl": "80px",
                        "xl": "48px",
                        "margin": "32px",
                        "xs": "4px",
                        "container-max": "1440px"
                },
                "fontFamily": {
                        "body-lg": ["Inter"],
                        "h3": ["Inter"],
                        "body-md": ["Inter"],
                        "stat-value": ["Inter"],
                        "label-sm": ["Inter"],
                        "h2": ["Inter"],
                        "h1": ["Inter"]
                },
                "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                        "h3": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                        "stat-value": ["20px", {"lineHeight": "1", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "h2": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "h1": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                }
              },
            },
          }
    </script>
    <style>
        .glass-card {
            background: rgba(28, 27, 28, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(221, 183, 255, 0.15);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen pb-32" 
      x-data="{ activeTab: 'home' }"
      hx-headers='{"X-CSRF-Token": "{{ .CSRFToken }}"}'
      @notify.window="addToast($event.detail.msg, $event.detail.type)">

    <!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50 bg-surface/60 backdrop-blur-[60px] border-b border-outline-variant/10">
        <div class="flex justify-between items-center px-lg h-16 w-full max-w-container-max mx-auto">
            <div class="flex items-center gap-md">
                <span class="material-symbols-outlined text-primary cursor-pointer active:scale-95 transition-transform">menu</span>
                <h1 class="font-h3 text-h3 uppercase tracking-widest font-bold text-primary">VAULT</h1>
            </div>
            <div class="w-10 h-10 rounded-full border border-primary/30 overflow-hidden active:scale-95 transition-transform cursor-pointer">
                <img alt="User" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCj7r2jcjkIPzCnIWdl81c_zvMWsrTnfReN29OfZJcKY7QDJIcr0JZ8aWrfMIjGkOqlRU-8amurNTnS3V6ocE7r12mwNxFtrOfg2ePKMlTqMT9I-Y4TLNExFJ3IAG44E1SjN_Ycnf0W3z1kfG887hQg0a2VlNx-YvBM2QXnhAHbX_jqrOYwpoJjJvmkwLM5iTR4qri-j6evoNV5e0NYDrFjpcIg2U4ED4Ew7mrMzeZEljz5dEYwnL-QKRV19MuPodyLEI8bSDDP7wY">
            </div>
        </div>
    </header>

    <main id="main-content" class="pt-24 px-md max-w-container-max mx-auto space-y-xl" 
          hx-get="/dashboard" hx-trigger="load">
        <!-- Content will be loaded here via HTMX -->
        <div class="flex items-center justify-center py-20">
            <div class="w-8 h-8 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
        </div>
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface/70 backdrop-blur-xl border-t border-outline-variant/20 shadow-[0_-4px_20px_rgba(221,183,255,0.05)]">
        <div class="flex justify-around items-center h-20 px-md w-full max-w-container-max mx-auto">
            <!-- Home -->
            <button @click="activeTab = 'home'" hx-get="/dashboard" hx-target="#main-content"
                    class="flex flex-col items-center justify-center transition-all duration-200"
                    :class="activeTab === 'home' ? 'text-primary relative after:content-[\'\'] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-primary after:rounded-full after:shadow-[0_0_8px_#ddb7ff] active:scale-90' : 'text-on-surface-variant hover:text-primary-fixed-dim'">
                <span class="material-symbols-outlined" :class="activeTab === 'home' && 'fill-icon'">home</span>
                <span class="font-label-sm text-[10px] uppercase tracking-tighter">Vault</span>
            </button>
            <!-- Wantlist -->
            <button @click="activeTab = 'wantlist'" hx-get="/wantlist" hx-target="#main-content"
                    class="flex flex-col items-center justify-center transition-all duration-200"
                    :class="activeTab === 'wantlist' ? 'text-primary relative after:content-[\'\'] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-primary after:rounded-full after:shadow-[0_0_8px_#ddb7ff] active:scale-90' : 'text-on-surface-variant hover:text-primary-fixed-dim'">
                <span class="material-symbols-outlined" :class="activeTab === 'wantlist' && 'fill-icon'">favorite</span>
                <span class="font-label-sm text-[10px] uppercase tracking-tighter">Grails</span>
            </button>
            <!-- Binders -->
            <button @click="activeTab = 'binders'" hx-get="/binders" hx-target="#main-content"
                    class="flex flex-col items-center justify-center transition-all duration-200"
                    :class="activeTab === 'binders' ? 'text-primary relative after:content-[\'\'] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-primary after:rounded-full after:shadow-[0_0_8px_#ddb7ff] active:scale-90' : 'text-on-surface-variant hover:text-primary-fixed-dim'">
                <span class="material-symbols-outlined" :class="activeTab === 'binders' && 'fill-icon'">style</span>
                <span class="font-label-sm text-[10px] uppercase tracking-tighter">Binders</span>
            </button>
            <!-- Scan -->
            <button @click="activeTab = 'scan'" hx-get="/centering" hx-target="#main-content"
                    class="flex flex-col items-center justify-center transition-all duration-200"
                    :class="activeTab === 'scan' ? 'text-primary relative after:content-[\'\'] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-primary after:rounded-full after:shadow-[0_0_8px_#ddb7ff] active:scale-90' : 'text-on-surface-variant hover:text-primary-fixed-dim'">
                <div class="bg-primary/10 p-2 rounded-full mb-1 border border-primary/20">
                    <span class="material-symbols-outlined text-primary">qr_code_scanner</span>
                </div>
                <span class="font-label-sm text-[10px] uppercase tracking-tighter">Scan</span>
            </button>
            <!-- Trade -->
            <button @click="activeTab = 'trade'" hx-get="/trade" hx-target="#main-content"
                    class="flex flex-col items-center justify-center transition-all duration-200"
                    :class="activeTab === 'trade' ? 'text-primary relative after:content-[\'\'] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-primary after:rounded-full after:shadow-[0_0_8px_#ddb7ff] active:scale-90' : 'text-on-surface-variant hover:text-primary-fixed-dim'">
                <span class="material-symbols-outlined" :class="activeTab === 'trade' && 'fill-icon'">swap_horiz</span>
                <span class="font-label-sm text-[10px] uppercase tracking-tighter">Trade</span>
            </button>
            <!-- Errors -->
            <button @click="activeTab = 'errors'" hx-get="/errors" hx-target="#main-content"
                    class="flex flex-col items-center justify-center transition-all duration-200"
                    :class="activeTab === 'errors' ? 'text-primary relative after:content-[\'\'] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-primary after:rounded-full after:shadow-[0_0_8px_#ddb7ff] active:scale-90' : 'text-on-surface-variant hover:text-primary-fixed-dim'">
                <span class="material-symbols-outlined" :class="activeTab === 'errors' && 'fill-icon'">warning</span>
                <span class="font-label-sm text-[10px] uppercase tracking-tighter">Misprints</span>
            </button>
            <!-- Profile -->
            <button @click="activeTab = 'profile'" hx-get="/auth" hx-target="#main-content"
                    class="flex flex-col items-center justify-center transition-all duration-200"
                    :class="activeTab === 'profile' ? 'text-primary relative after:content-[\'\'] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-primary after:rounded-full after:shadow-[0_0_8px_#ddb7ff] active:scale-90' : 'text-on-surface-variant hover:text-primary-fixed-dim'">
                <span class="material-symbols-outlined" :class="activeTab === 'profile' && 'fill-icon'">person</span>
                <span class="font-label-sm text-[10px] uppercase tracking-tighter">Access</span>
            </button>
        </div>
    </nav>

    <!-- Toast Notification -->
    <div x-data="{ toasts: [] }" 
         @notify.window="toasts.push({ id: Date.now(), msg: $event.detail.msg, type: $event.detail.type }); setTimeout(() => toasts.shift(), 3000)"
         class="fixed top-6 left-half translate-x-half z-[100] flex flex-col gap-2 w-full max-w-[90%] pointer-events-none">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-transition.duration.300ms
                 class="glass-card px-6 py-3 shadow-2xl flex items-center gap-3 border-l-4"
                 :class="toast.type === 'error' ? 'border-red-500' : 'border-primary'">
                <span class="material-symbols-outlined text-lg" 
                      :class="toast.type === 'error' ? 'text-red-400' : 'text-primary'"
                      x-text="toast.type === 'error' ? 'error' : 'check_circle'"></span>
                <p class="text-sm font-bold" x-text="toast.msg"></p>
            </div>
        </template>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-md bg-black/60 backdrop-blur-sm">
        <div class="glass-card w-full max-w-md rounded-2xl p-lg space-y-md">
            <h3 class="font-h3 text-xl font-bold text-on-surface">Edit Card Details</h3>
            <form id="edit-form" hx-post="/portfolio/edit" hx-swap="none" @htmx:after-request="document.getElementById('edit-modal').classList.add('hidden'); htmx.ajax('GET', '/dashboard', '#main-content')">
                <input type="hidden" name="item_id" id="edit-item-id">
                <div class="space-y-sm">
                    <label class="text-[10px] uppercase font-bold text-on-surface-variant">Custom Price Override ($)</label>
                    <input type="number" step="0.01" name="custom_price" id="edit-custom-price" class="w-full bg-white/5 border border-white/10 rounded-lg p-sm text-on-surface">
                </div>
                <div class="space-y-sm mt-md">
                    <label class="text-[10px] uppercase font-bold text-on-surface-variant">Private Notes (e.g. Miscut, Error)</label>
                    <textarea name="notes" id="edit-notes" class="w-full bg-white/5 border border-white/10 rounded-lg p-sm text-on-surface h-24"></textarea>
                </div>
                <div class="flex gap-sm mt-xl">
                    <button type="button" class="flex-1 px-md py-sm rounded-lg bg-white/5 text-on-surface" onclick="document.getElementById('edit-modal').classList.add('hidden')">Cancel</button>
                    <button type="submit" class="flex-1 px-md py-sm rounded-lg bg-primary text-on-primary font-bold">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openEditModal(id, notes, price) {
            document.getElementById('edit-item-id').value = id;
            document.getElementById('edit-notes').value = notes || '';
            document.getElementById('edit-custom-price').value = price || '';
            document.getElementById('edit-modal').classList.remove('hidden');
        }
    </script>
</body>
</html>
