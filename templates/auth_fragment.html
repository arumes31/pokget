<div class="animate-in" x-data="{ mode: 'login', resendDisabled: false, countdown: 0, signupAttempted: false }">
    <div class="glass-card">
        <!-- Mode Toggle -->
        <div class="toggle-group">
            <button @click="mode = 'login'; signupAttempted = false" 
                    class="toggle-button"
                    :class="mode === 'login' ? 'active' : 'inactive'">
                Login
            </button>
            <button @click="mode = 'register'" 
                    class="toggle-button"
                    :class="mode === 'register' ? 'active' : 'inactive'">
                Sign Up
            </button>
        </div>

        <!-- Login Form -->
        <form x-show="mode === 'login'" hx-post="/auth/login" hx-target="body" class="auth-container">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="collector@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full primary-button py-4 mt-4">
                Sign In
            </button>
        </form>

        <!-- Register Form -->
        <form x-show="mode === 'register'" hx-post="/auth/register" hx-target="#main-content" class="auth-container">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="collector@example.com" required>
            </div>
            <div class="input-group">
                <label>Create Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" @click="signupAttempted = true" class="w-full primary-button py-4 mt-4">
                Create Account
            </button>
        </form>

        <!-- Resend Verification (Only after attempt) -->
        <div x-show="signupAttempted && mode === 'register'" class="mt-8 pt-8 border-t border-white/5 text-center" x-transition>
            <p class="text-xs text-white/40 mb-4">Didn't get the email?</p>
            <button @click="
                if (!resendDisabled) {
                    resendDisabled = true;
                    countdown = 300;
                    let timer = setInterval(() => {
                        countdown--;
                        if (countdown <= 0) {
                            clearInterval(timer);
                            resendDisabled = false;
                        }
                    }, 1000);
                    
                    const emailInput = $el.closest('.glass-card').querySelector('input[type=\'email\']');
                    const formData = new FormData();
                    formData.append('email', emailInput.value);

                    fetch('/auth/resend', { 
                        method: 'POST', 
                        body: formData 
                    }).then(res => {
                        if (res.ok) {
                            $dispatch('notify', { msg: 'Verification email resent!', type: 'success' });
                        } else {
                            $dispatch('notify', { msg: 'Too many requests. Please wait.', type: 'error' });
                        }
                    });
                }"
                :disabled="resendDisabled"
                class="w-full glass-button py-3 text-xs font-bold">
                <span x-text="resendDisabled ? 'Resend in ' + Math.floor(countdown/60) + ':' + (countdown%60).toString().padStart(2, '0') : 'Resend Verification Email'"></span>
            </button>
        </div>
    </div>

    <p class="mt-8 text-center text-xs text-white/20">
        Collector's Financial Hub &copy; 2026 Pokget
    </p>
</div>
