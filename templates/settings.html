{{ define "settings" }}
<div id="settings-content" class="space-y-6">
    <div class="glass-card p-6 border-white/5">
        <h2 class="text-lg font-bold text-on-surface mb-4">Currency Preference</h2>
        <p class="text-xs text-on-surface-variant mb-6 leading-relaxed">Select your primary currency for market valuations and price display. This affects all portfolios and binders.</p>
        
        <form hx-post="/settings" hx-target="#settings-content" hx-swap="outerHTML" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <label class="relative cursor-pointer group">
                    <input type="radio" name="currency" value="EUR" class="peer sr-only" {{ if eq .Currency "EUR" }}checked{{ end }}>
                    <div class="p-4 rounded-xl border border-white/10 bg-white/5 transition-all group-hover:bg-white/10 peer-checked:border-primary peer-checked:bg-primary/10">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl font-bold {{ if eq .Currency "EUR" }}text-primary{{ else }}text-on-surface/40{{ end }}">€</span>
                            <div>
                                <p class="text-xs font-bold text-on-surface">Euro</p>
                                <p class="text-[10px] text-on-surface-variant">Default</p>
                            </div>
                        </div>
                    </div>
                </label>

                <label class="relative cursor-pointer group">
                    <input type="radio" name="currency" value="USD" class="peer sr-only" {{ if eq .Currency "USD" }}checked{{ end }}>
                    <div class="p-4 rounded-xl border border-white/10 bg-white/5 transition-all group-hover:bg-white/10 peer-checked:border-primary peer-checked:bg-primary/10">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl font-bold {{ if eq .Currency "USD" }}text-primary{{ else }}text-on-surface/40{{ end }}">$</span>
                            <div>
                                <p class="text-xs font-bold text-on-surface">US Dollar</p>
                                <p class="text-[10px] text-on-surface-variant">International</p>
                            </div>
                        </div>
                    </div>
                </label>
            </div>
            
            <button type="submit" class="w-full bg-primary text-surface font-bold py-3 rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all">
                Save Changes
            </button>
        </form>
    </div>

    <div class="glass-card p-6 border-white/5">
        <h2 class="text-lg font-bold text-on-surface mb-2">Account Node</h2>
        <p class="text-xs text-on-surface-variant mb-4">Managed via encrypted session: {{ .Email }}</p>
        <button class="text-xs font-bold text-red-400 hover:text-red-300 transition-colors" onclick="$dispatch('notify', { msg: 'Password reset coming soon!', type: 'info' })">
            Request Password Reset
        </button>
    </div>
</div>
{{ end }}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Pokget</title>
    <link href="/static/css/tailwind.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="/static/js/htmx.min.js"></script>
    <script defer src="/static/js/alpine.min.js"></script>
</head>
<body class="bg-surface text-on-surface font-sans selection:bg-primary/30 min-h-screen">
    <div class="max-w-md mx-auto p-4 space-y-8">
        <!-- Header -->
        <header class="flex items-center justify-between pt-4">
            <div class="flex items-center gap-4">
                <a href="/" class="p-2 hover:bg-white/5 rounded-full transition-colors">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <h1 class="text-2xl font-black tracking-tightest bg-gradient-to-br from-white to-white/60 bg-clip-text text-transparent italic">SETTINGS</h1>
            </div>
        </header>

        {{ template "settings" . }}
    </div>

    <!-- Notifications Container -->
    <div x-data="{ toasts: [] }" 
         @notify.window="toasts.push({ id: Date.now(), msg: $event.detail.msg, type: $event.detail.type }); setTimeout(() => toasts.shift(), 3000)"
         class="fixed bottom-6 right-6 z-[100] space-y-3 pointer-events-none">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-show="true" 
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="translate-y-4 opacity-0 scale-95"
                 x-transition:enter-end="translate-y-0 opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 scale-100"
                 x-transition:leave-end="opacity-0 scale-90"
                 :class="{
                    'bg-emerald-500/90': toast.type === 'success',
                    'bg-red-500/90': toast.type === 'error',
                    'bg-blue-500/90': toast.type === 'info'
                 }"
                 class="px-6 py-3 rounded-2xl shadow-2xl backdrop-blur-md text-white font-bold text-sm flex items-center gap-3 pointer-events-auto border border-white/20">
                <span x-text="toast.msg"></span>
            </div>
        </template>
    </div>
</body>
</html>
