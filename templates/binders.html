<div class="space-y-6">
    <div class="flex items-center justify-between px-1">
        <h2 class="text-lg font-bold">My Binders</h2>
        <button class="text-purple-400 text-xs font-bold hover:text-purple-300 focus:outline-none focus:ring-2 focus:ring-purple-500/50 rounded px-2">+ New Binder</button>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <!-- Binder Card -->
        <button class="glass-card p-4 aspect-square flex flex-col justify-between border-purple-500/20 group hover:border-purple-500/50 transition-all focus:outline-none focus:ring-2 focus:ring-purple-500/50 text-left"
                aria-label="Charizard Master Set, 42 cards, updated 2 hours ago">
            <div class="flex justify-between items-start">
                <div class="w-10 h-10 bg-purple-500/20 rounded-lg flex items-center justify-center text-purple-400 group-hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg>
                </div>
                <span class="text-[10px] font-bold text-white/20">42 Cards</span>
            </div>
            <div>
                <p class="text-sm font-bold truncate">Charizard Master Set</p>
                <p class="text-[10px] text-white/40">Updated 2h ago</p>
            </div>
        </button>

        <!-- Binder Card -->
        <button class="glass-card p-4 aspect-square flex flex-col justify-between group hover:border-blue-500/50 transition-all focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-left"
                aria-label="Modern Binder, 128 cards, updated 1 day ago">
            <div class="flex justify-between items-start">
                <div class="w-10 h-10 bg-blue-500/20 rounded-lg flex items-center justify-center text-blue-400 group-hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg>
                </div>
                <span class="text-[10px] font-bold text-white/20">128 Cards</span>
            </div>
            <div>
                <p class="text-sm font-bold truncate">Modern Binder</p>
                <p class="text-[10px] text-white/40">Updated 1d ago</p>
            </div>
        </button>

        <!-- Wishlist -->
        <button class="glass-card p-4 aspect-square flex flex-col justify-between border-pink-500/20 group hover:border-pink-500/50 transition-all focus:outline-none focus:ring-2 focus:ring-pink-500/50 text-left"
                aria-label="Wishlist, 12 cards, private">
            <div class="flex justify-between items-start">
                <div class="w-10 h-10 bg-pink-500/20 rounded-lg flex items-center justify-center text-pink-400 group-hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                </div>
                <span class="text-[10px] font-bold text-white/20">12 Cards</span>
            </div>
            <div>
                <p class="text-sm font-bold truncate">Wishlist</p>
                <p class="text-[10px] text-white/40">Private</p>
            </div>
        </button>
    </div>
</div>
